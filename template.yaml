AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  AgroFlightOps — Backend Serverless (Lambda + API Gateway) e Frontend (S3 + CloudFront).
  Pipeline de deploy multi-ambiente (dev, hml, prd) com AWS SAM.

# =============================================================================
# Parameters
# =============================================================================
Parameters:
  Environment:
    Type: String
    Description: Ambiente de deploy (dev, hml, prd)
    AllowedValues:
      - dev
      - hml
      - prd
    Default: dev

  VpcSubnetIds:
    Type: CommaDelimitedList
    Description: IDs das subnets privadas para a Lambda (ex. subnet-xxx,subnet-yyy)

  VpcSecurityGroupIds:
    Type: CommaDelimitedList
    Description: IDs dos Security Groups para a Lambda (ex. sg-xxx)

  DatabaseUrl:
    Type: String
    NoEcho: true
    Description: Connection string do banco MySQL (ex. mysql+aiomysql://user:pass@host:3306/db)

  JwtSecret:
    Type: String
    NoEcho: true
    Description: Chave secreta para assinatura de tokens JWT

  JwtAlgorithm:
    Type: String
    Description: Algoritmo utilizado para assinatura JWT
    Default: HS256

  JwtExpirationMinutes:
    Type: String
    Description: Tempo de expiração do token JWT em minutos
    Default: '60'

  S3DocumentsBucket:
    Type: String
    Description: Nome do bucket S3 de documentos existente

  S3Region:
    Type: String
    Description: Região AWS do bucket S3
    Default: us-east-1

  CorsOrigins:
    Type: String
    Description: Origens permitidas para CORS (separadas por vírgula)

  AppEnv:
    Type: String
    Description: Valor da variável de ambiente APP_ENV
    Default: dev

  Debug:
    Type: String
    Description: Flag de debug (true/false)
    AllowedValues:
      - 'true'
      - 'false'
    Default: 'false'

  Autor:
    Type: String
    Description: Nome do autor para TAG de recursos
    Default: Alberto Moreira

  TelemetriaRawBucketName:
    Type: String
    Description: Nome opcional do bucket S3 Raw de telemetria (se vazio, nome gerado automaticamente)
    Default: ''

  TelemetriaProcessedBucketName:
    Type: String
    Description: Nome opcional do bucket S3 Processed de telemetria (se vazio, nome gerado automaticamente)
    Default: ''

# =============================================================================
# Conditions
# =============================================================================
Conditions:
  HasCustomRawBucketName: !Not [!Equals [!Ref TelemetriaRawBucketName, '']]
  HasCustomProcessedBucketName: !Not [!Equals [!Ref TelemetriaProcessedBucketName, '']]

# =============================================================================
# Globals
# =============================================================================
Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: python3.12
    Tags:
      Cliente: VistaAgrotech
      Projeto: AgroFlightOps
      Ambiente: !Ref Environment
      Autor: !Ref Autor

# =============================================================================
# Resources (definidos nas próximas tarefas)
# =============================================================================
Resources:
  # ---------------------------------------------------------------------------
  # Lambda Function — Backend FastAPI via Mangum
  # ---------------------------------------------------------------------------
  AgroFlightOpsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.main.handler
      CodeUri: .
      Role: !GetAtt LambdaExecutionRole.Arn
      VpcConfig:
        SubnetIds: !Ref VpcSubnetIds
        SecurityGroupIds: !Ref VpcSecurityGroupIds
      Environment:
        Variables:
          DATABASE_URL: !Ref DatabaseUrl
          JWT_SECRET: !Ref JwtSecret
          JWT_ALGORITHM: !Ref JwtAlgorithm
          JWT_EXPIRATION_MINUTES: !Ref JwtExpirationMinutes
          S3_BUCKET: !Ref S3DocumentsBucket
          S3_REGION: !Ref S3Region
          CORS_ORIGINS: !Ref CorsOrigins
          APP_ENV: !Ref AppEnv
          DEBUG: !Ref Debug
          TELEMETRIA_RAW_BUCKET: !Ref TelemetriaRawBucket
          TELEMETRIA_PROCESSED_BUCKET: !Ref TelemetriaProcessedBucket
      Events:
        CatchAll:
          Type: HttpApi
          Properties:
            ApiId: !Ref AgroFlightOpsApi
            Path: /{proxy+}
            Method: ANY
    Metadata:
      BuildMethod: python3.12

  # ---------------------------------------------------------------------------
  # API Gateway HTTP — Proxy para Lambda
  # ---------------------------------------------------------------------------
  AgroFlightOpsApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      CorsConfiguration:
        AllowOrigins: !Split [",", !Ref CorsOrigins]
        AllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        AllowHeaders:
          - "*"

  # ---------------------------------------------------------------------------
  # IAM Role — Lambda Execution Role (menor privilégio)
  # ---------------------------------------------------------------------------
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "AgroFlightOps-${Environment}-LambdaExecutionRole"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        # Política CloudWatch Logs
        - PolicyName: !Sub "AgroFlightOps-${Environment}-CloudWatchLogs"
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"
        # Política S3 Documentos
        - PolicyName: !Sub "AgroFlightOps-${Environment}-S3Documentos"
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub "arn:aws:s3:::${S3DocumentsBucket}/*"
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !Sub "arn:aws:s3:::${S3DocumentsBucket}"
        # Política VPC (ENI management — Resource * requerido pela AWS)
        - PolicyName: !Sub "AgroFlightOps-${Environment}-VPCAccess"
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:CreateNetworkInterface
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DeleteNetworkInterface
                Resource: "*"
        # Política S3 Leitura — Telemetria Processed Bucket
        - PolicyName: !Sub "AgroFlightOps-${Environment}-S3TelemetriaProcessedRead"
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub "${TelemetriaProcessedBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !GetAtt TelemetriaProcessedBucket.Arn
        # Política S3 Escrita — Telemetria Raw Bucket (upload endpoint)
        - PolicyName: !Sub "AgroFlightOps-${Environment}-S3TelemetriaRawWrite"
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub "${TelemetriaRawBucket.Arn}/*"
        # Política Bedrock — Invocação de modelo para insights IA
        - PolicyName: !Sub "AgroFlightOps-${Environment}-BedrockInvokeModel"
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: "*"
      Tags:
        - Key: Cliente
          Value: VistaAgrotech
        - Key: Projeto
          Value: AgroFlightOps
        - Key: Ambiente
          Value: !Ref Environment
        - Key: Autor
          Value: !Ref Autor

  # ---------------------------------------------------------------------------
  # S3 Bucket — Frontend Static Hosting
  # ---------------------------------------------------------------------------
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Cliente
          Value: VistaAgrotech
        - Key: Projeto
          Value: AgroFlightOps
        - Key: Ambiente
          Value: !Ref Environment
        - Key: Autor
          Value: !Ref Autor

  # ---------------------------------------------------------------------------
  # CloudFront Origin Access Control (OAC) — Acesso seguro ao S3
  # ---------------------------------------------------------------------------
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "AgroFlightOps-${Environment}-OAC"
        Description: !Sub "OAC para acesso ao Frontend Bucket - ${Environment}"
        SigningProtocol: sigv4
        SigningBehavior: always
        OriginAccessControlOriginType: s3

  # ---------------------------------------------------------------------------
  # CloudFront Distribution — CDN para Frontend SPA
  # ---------------------------------------------------------------------------
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3FrontendOrigin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: S3FrontendOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          AllowedMethods:
            - GET
            - HEAD
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
      Tags:
        - Key: Cliente
          Value: VistaAgrotech
        - Key: Projeto
          Value: AgroFlightOps
        - Key: Ambiente
          Value: !Ref Environment
        - Key: Autor
          Value: !Ref Autor

  # ---------------------------------------------------------------------------
  # S3 Bucket Policy — Acesso somente via CloudFront (OAC)
  # ---------------------------------------------------------------------------
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${FrontendBucket}/*"
            Condition:
              StringEquals:
                aws:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # ---------------------------------------------------------------------------
  # S3 Bucket — Telemetria Raw (ingestão de arquivos brutos)
  # ---------------------------------------------------------------------------
  TelemetriaRawBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If
        - HasCustomRawBucketName
        - !Ref TelemetriaRawBucketName
        - !Sub "agroflightops-${Environment}-telemetria-raw"
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true
      Tags:
        - Key: Cliente
          Value: VistaAgrotech
        - Key: Projeto
          Value: AgroFlightOps
        - Key: Ambiente
          Value: !Ref Environment
        - Key: Autor
          Value: !Ref Autor

  # ---------------------------------------------------------------------------
  # S3 Bucket — Telemetria Processed (dados processados particionados)
  # ---------------------------------------------------------------------------
  TelemetriaProcessedBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If
        - HasCustomProcessedBucketName
        - !Ref TelemetriaProcessedBucketName
        - !Sub "agroflightops-${Environment}-telemetria-processed"
      Tags:
        - Key: Cliente
          Value: VistaAgrotech
        - Key: Projeto
          Value: AgroFlightOps
        - Key: Ambiente
          Value: !Ref Environment
        - Key: Autor
          Value: !Ref Autor

  # ---------------------------------------------------------------------------
  # IAM Role — Lambda Processor de Telemetria (menor privilégio)
  # ---------------------------------------------------------------------------
  TelemetriaProcessorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "AgroFlightOps-${Environment}-TelemetriaProcessorRole"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        # Política CloudWatch Logs
        - PolicyName: !Sub "AgroFlightOps-${Environment}-TelemetriaProcessor-CloudWatchLogs"
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"
        # Política S3 Read — Raw Bucket
        - PolicyName: !Sub "AgroFlightOps-${Environment}-TelemetriaProcessor-S3Read"
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt TelemetriaRawBucket.Arn
                  - !Sub "${TelemetriaRawBucket.Arn}/*"
        # Política S3 Write — Processed Bucket
        - PolicyName: !Sub "AgroFlightOps-${Environment}-TelemetriaProcessor-S3Write"
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt TelemetriaProcessedBucket.Arn
                  - !Sub "${TelemetriaProcessedBucket.Arn}/*"
      Tags:
        - Key: Cliente
          Value: VistaAgrotech
        - Key: Projeto
          Value: AgroFlightOps
        - Key: Ambiente
          Value: !Ref Environment
        - Key: Autor
          Value: !Ref Autor

  # ---------------------------------------------------------------------------
  # Lambda Function — Telemetria Processor (processamento de dados brutos)
  # ---------------------------------------------------------------------------
  TelemetriaProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: processor.lambda_handler
      CodeUri: lambda_processor/
      Runtime: python3.12
      Timeout: 120
      MemorySize: 512
      Role: !GetAtt TelemetriaProcessorRole.Arn
      Environment:
        Variables:
          PROCESSED_BUCKET: !Ref TelemetriaProcessedBucket
      Tags:
        Cliente: VistaAgrotech
        Projeto: AgroFlightOps
        Ambiente: !Ref Environment
        Autor: !Ref Autor
    Metadata:
      BuildMethod: python3.12

  # ---------------------------------------------------------------------------
  # EventBridge Rule — Aciona Lambda Processor quando objeto criado no Raw Bucket
  # ---------------------------------------------------------------------------
  TelemetriaEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "AgroFlightOps-${Environment}-telemetria-raw-to-processor"
      EventPattern:
        source:
          - aws.s3
        detail-type:
          - Object Created
        detail:
          bucket:
            name:
              - !Ref TelemetriaRawBucket
          object:
            key:
              - prefix: "incoming/"
      State: ENABLED
      Targets:
        - Arn: !GetAtt TelemetriaProcessorFunction.Arn
          Id: TelemetriaProcessorTarget

  # ---------------------------------------------------------------------------
  # Lambda Permission — EventBridge pode invocar o Lambda Processor
  # ---------------------------------------------------------------------------
  TelemetriaEventPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TelemetriaProcessorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt TelemetriaEventRule.Arn

  # ---------------------------------------------------------------------------
  # S3 Bucket — Athena Results (resultados de queries Athena)
  # ---------------------------------------------------------------------------
  TelemetriaAthenaResultsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "agroflightops-${Environment}-telemetria-athena-results"
      Tags:
        - Key: Cliente
          Value: VistaAgrotech
        - Key: Projeto
          Value: AgroFlightOps
        - Key: Ambiente
          Value: !Ref Environment
        - Key: Autor
          Value: !Ref Autor

  # ---------------------------------------------------------------------------
  # Glue Database — Catálogo de dados de telemetria
  # ---------------------------------------------------------------------------
  TelemetriaGlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Sub "agroflightops_${Environment}_telemetria"
        Description: !Sub "Banco de dados Glue para telemetria de drones - ${Environment}"

  # ---------------------------------------------------------------------------
  # Athena WorkGroup — Consultas analíticas de telemetria
  # ---------------------------------------------------------------------------
  TelemetriaAthenaWorkGroup:
    Type: AWS::Athena::WorkGroup
    Properties:
      Name: !Sub "AgroFlightOps-${Environment}-telemetria"
      State: ENABLED
      WorkGroupConfiguration:
        ResultConfiguration:
          OutputLocation: !Sub "s3://${TelemetriaAthenaResultsBucket}/results/"
        EnforceWorkGroupConfiguration: true
        PublishCloudWatchMetricsEnabled: true
      Tags:
        - Key: Cliente
          Value: VistaAgrotech
        - Key: Projeto
          Value: AgroFlightOps
        - Key: Ambiente
          Value: !Ref Environment
        - Key: Autor
          Value: !Ref Autor

# =============================================================================
# Outputs
# =============================================================================
Outputs:
  ApiUrl:
    Description: URL do API Gateway
    Value: !Sub "https://${AgroFlightOpsApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
    Export:
      Name: !Sub "AgroFlightOps-${Environment}-ApiUrl"

  FrontendBucketName:
    Description: Nome do bucket S3 do frontend
    Value: !Ref FrontendBucket
    Export:
      Name: !Sub "AgroFlightOps-${Environment}-FrontendBucket"

  CloudFrontDomainName:
    Description: Domain name da distribuição CloudFront
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub "AgroFlightOps-${Environment}-CloudFrontDomain"

  CloudFrontDistributionId:
    Description: ID da distribuição CloudFront
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub "AgroFlightOps-${Environment}-CloudFrontDistId"

  TelemetriaRawBucketName:
    Description: Nome do bucket S3 Raw de telemetria
    Value: !Ref TelemetriaRawBucket
    Export:
      Name: !Sub "AgroFlightOps-${Environment}-TelemetriaRawBucket"

  TelemetriaProcessedBucketName:
    Description: Nome do bucket S3 Processed de telemetria
    Value: !Ref TelemetriaProcessedBucket
    Export:
      Name: !Sub "AgroFlightOps-${Environment}-TelemetriaProcessedBucket"

  TelemetriaAthenaResultsBucketName:
    Description: Nome do bucket S3 de resultados Athena de telemetria
    Value: !Ref TelemetriaAthenaResultsBucket
    Export:
      Name: !Sub "AgroFlightOps-${Environment}-TelemetriaAthenaResultsBucket"

  TelemetriaProcessorFunctionArn:
    Description: ARN da Lambda Processor de telemetria
    Value: !GetAtt TelemetriaProcessorFunction.Arn
    Export:
      Name: !Sub "AgroFlightOps-${Environment}-TelemetriaProcessorFunctionArn"

  TelemetriaProcessorRoleArn:
    Description: ARN da IAM Role do Lambda Processor de telemetria
    Value: !GetAtt TelemetriaProcessorRole.Arn
    Export:
      Name: !Sub "AgroFlightOps-${Environment}-TelemetriaProcessorRoleArn"

  GlueDatabaseName:
    Description: Nome do banco de dados Glue de telemetria
    Value: !Ref TelemetriaGlueDatabase
    Export:
      Name: !Sub "AgroFlightOps-${Environment}-GlueDatabaseName"

  AthenaWorkGroupName:
    Description: Nome do WorkGroup Athena de telemetria
    Value: !Ref TelemetriaAthenaWorkGroup
    Export:
      Name: !Sub "AgroFlightOps-${Environment}-AthenaWorkGroupName"
